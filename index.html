<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>That’s the MOMENT!!!</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; font-size: 22px; margin-bottom: 5px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .preview-area { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 20px; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 15px; }
        #canvas { display: none; }
        #resultImg { width: 100%; height: 100%; object-fit: contain; display: none; }
        .btn-upload { display: inline-block; padding: 15px 40px; background: #459DA0; color: white; border-radius: 50px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-upload:active { background: #357d7f; }
        #instruction { display: none; margin-top: 15px; color: #555; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>That’s the MOMENT!!!</h1>
        <p>拍下感受到地球力的時刻</p>
        
        <div class="preview-area">
            <div id="placeholder" style="color: #999;">尚未選擇照片</div>
            <canvas id="canvas"></canvas>
            <img id="resultImg" alt="你的照片">
        </div>

        <input type="file" id="upload" accept="image/*" style="display:none;">
        <label for="upload" class="btn-upload">選擇照片 / 拍照</label>
        
        <div id="instruction">📱 手機長按上方圖片即可「加入照片」<br>💻 電腦右鍵另存圖片</div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('resultImg');
        const placeholder = document.getElementById('placeholder');
        const instruction = document.getElementById('instruction');
        const frameImg = new Image();
        frameImg.src = 'frame.png';

        upload.addEventListener('change', (e) => {
            if (!e.target.files.length) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const size = 1080;
                    canvas.width = size; canvas.height = size;
                    let sSize = Math.min(img.width, img.height);
                    let sX = (img.width - sSize) / 2;
                    let sY = (img.height - sSize) / 2;
                    
                    ctx.drawImage(img, sX, sY, sSize, sSize, 0, 0, size, size);
                    ctx.drawImage(frameImg, 0, 0, size, size);
                    
                    resultImg.src = canvas.toDataURL('image/png');
                    resultImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    instruction.style.display = 'block';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
